name: Generate report assets

# Manually triggered (Actions tab -> "Generate report assets" -> Run workflow).
# Produces the two README assets that need a Linux machine, and commits them:
#   docs/flamegraph.svg      - perf flamegraph of the 10k-digit workload
#   docs/arb-comparison.md   - measured rigor vs Arb vs MPFR table
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install FLINT, MPFR, perf, cargo-flamegraph
        run: |
          sudo apt-get update
          sudo apt-get install -y libflint-dev libmpfr-dev linux-tools-common linux-tools-generic
          cargo install flamegraph
      - name: Arb/MPFR comparison table
        run: |
          mkdir -p docs
          {
            echo "# rigor vs Arb vs MPFR"
            echo
            echo "Generated by tools/arb-bench on a GitHub Actions runner"
            echo "($(date -u +%Y-%m-%d), $(nproc) vCPU; treat as relative, not absolute)."
            echo
            cargo run --release --manifest-path tools/arb-bench/Cargo.toml
          } | tee docs/arb-comparison.md
          echo '## Comparison table' >> "$GITHUB_STEP_SUMMARY"
          cat docs/arb-comparison.md >> "$GITHUB_STEP_SUMMARY"
      - name: Flamegraph
        run: |
          echo 1 | sudo tee /proc/sys/kernel/perf_event_paranoid
          cargo flamegraph --example quick_timing -o docs/flamegraph.svg
      - name: Commit assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/flamegraph.svg docs/arb-comparison.md
          git commit -m "docs: CI-generated flamegraph and Arb comparison table [skip ci]"
          git push
